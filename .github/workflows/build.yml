name: Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn package -pl paper -am -DskipTests
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ChatGames-Paper
          path: paper/target/ChatGames-Paper-*.jar
